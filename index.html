<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Question</title>
<style>
/* RESET & BODY */
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
body{height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;
background:linear-gradient(-45deg,#ff6ec4,#7873f5,#ff9a9e,#fad0c4);background-size:400% 400%;
animation: gradientMove 12s ease infinite;position:relative;}

/* GRADIENT ANIMATION */
@keyframes gradientMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

/* CARD */
.card{background: rgba(255,255,255,0.15);backdrop-filter: blur(12px);padding:40px;border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);text-align:center;max-width:420px;color:white;position:relative;z-index:10;}
h1{font-size:26px;margin-bottom:30px;}
.buttons{display:flex;justify-content:center;gap:20px;position:relative;flex-wrap:wrap;}
button{padding:12px 30px;border:none;border-radius:40px;font-size:18px;cursor:pointer;transition:all 0.25s ease;
box-shadow:0 6px 20px rgba(0,0,0,0.3);}
button:hover{transform:scale(1.1);}

/* YES BUTTON */
#yes{background:#ff4d6d;color:white;z-index:5;}

/* NO BUTTON */
#no{background:#ffd700;color:#444;position:relative;cursor:pointer;font-weight:bold;box-shadow:0 5px 20px rgba(0,0,0,0.4);}

/* SECOND INTERFACE */
.interface{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;
align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.5s;overflow:hidden;z-index:20;}
.interface.show{opacity:1;pointer-events:auto;}
.interface img{max-width:300px;border-radius:20px;margin-top:20px;transform:scale(0);opacity:0;animation:zoomIn 1s forwards 0.5s;}
@keyframes zoomIn{to{transform:scale(1);opacity:1;}}
.interface .message{color:white;font-size:28px;margin-top:20px;text-align:center;animation:fadeIn 1s forwards;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* CURSOR HEARTS */
.heart{position:absolute;pointer-events:none;font-size:20px;color:#ff4d6d;opacity:0.8;transform:scale(0);animation:floatHeart 2s forwards;}
@keyframes floatHeart{to{transform:translateY(-100px) scale(1.2);opacity:0;}}

/* CONFETTI */
.confetti{position:fixed;width:8px;height:8px;background:red;top:-10px;pointer-events:none;border-radius:50%;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

/* BACKGROUND FLOATING HEARTS */
.bg-heart{position:absolute;font-size:18px;color:#ff4d6d;opacity:0.5;animation:riseBg 8s linear infinite;}
@keyframes riseBg{0%{transform:translateY(100vh) scale(0.5);}100%{transform:translateY(-10vh) scale(1.2);opacity:0;}}

/* GO BACK BUTTON */
.goBack{margin-top:25px;padding:12px 25px;border:none;border-radius:30px;background:white;color:#444;font-weight:bold;cursor:pointer;box-shadow:0 5px 20px rgba(0,0,0,0.3);transition:all 0.25s;}
.goBack:hover{transform:scale(1.1);}
</style>
</head>
<body>

<div class="card">
  <h1>Will you be my nigga forever 😋</h1>
  <div class="buttons">
    <button id="yes">Yes</button>
    <button id="no">No</button> <!-- Only here -->
  </div>
</div>

<!-- YES INTERFACE -->
<div id="yesInterface" class="interface" style="background:radial-gradient(circle at center,#ff4d6d,#ff9a9e,#fad0c4);">
  <div class="message"></div>
  <img src="pc1.jpg" alt="photo">
</div>

<!-- NO INTERFACE -->
<div id="noInterface" class="interface" style="background:radial-gradient(circle at center,#ffd700,#ffb347,#ffcc33);">
  <div class="message"> fuhh yuhh.... bitchh </div>
  <img src="pc2.jpg" alt="photo">
  <button class="goBack">Go Back</button>
</div>

<script>
// CURSOR HEARTS
document.addEventListener("mousemove", e=>createCursorHeart(e.clientX,e.clientY));
document.addEventListener("touchmove", e=>{if(e.touches.length>0){const t=e.touches[0];createCursorHeart(t.clientX,t.clientY);}});
function createCursorHeart(x,y){
  const heart=document.createElement("div");heart.className="heart";heart.innerHTML="❤";
  heart.style.left=(x-10)+"px";heart.style.top=(y-10)+"px";
  heart.style.fontSize=(10+Math.random()*20)+"px";
  heart.style.animationDuration=(1.5+Math.random()*1)+"s";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),2000);
}

// NO BUTTON MOVEMENT (only inside card)
const noBtn=document.getElementById("no");
function moveNoButton(){
  const maxMove=20;
  noBtn.style.transform = `translate(${Math.random()*maxMove - maxMove/2}px, ${Math.random()*maxMove - maxMove/2}px)`;
}
noBtn.addEventListener("mouseover", moveNoButton);
noBtn.addEventListener("touchstart", moveNoButton);

// YES BUTTON
const yesBtn=document.getElementById("yes");
const yesInterface=document.getElementById("yesInterface");
const noInterface=document.getElementById("noInterface");

yesBtn.onclick=function(){
  yesInterface.classList.add("show");
  launchConfetti();
  launchBackgroundHearts();
}

// NO BUTTON CLICK
noBtn.onclick=function(){
  noInterface.classList.add("show");
  launchConfetti();
  launchBackgroundHearts();
}

// GO BACK BUTTON
document.querySelector(".goBack").onclick=function(){
  noInterface.classList.remove("show");
}

// CONFETTI
function launchConfetti(){
  for(let i=0;i<120;i++){
    const c=document.createElement("div");c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=`hsl(${Math.random()*360},80%,60%)`;
    c.style.width=(5+Math.random()*5)+"px";
    c.style.height=c.style.width;
    c.style.borderRadius="50%";
    c.style.animationDuration=(2+Math.random()*2)+"s";
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}

// BACKGROUND HEARTS
function launchBackgroundHearts(){
  for(let i=0;i<40;i++){
    const h=document.createElement("div");h.className="bg-heart";h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(12+Math.random()*20)+"px";
    h.style.animationDuration=(6+Math.random()*4)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),8000);
  }
}
</script>
</body>
</html>
